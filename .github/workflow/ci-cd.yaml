name: Java CI with Maven

stages:
  - build
  - test

variables:
  BASE_URL: "https://dummyjson.com/"
  ENABLE_USERS_FLAG: "false"
  TIMEOUT: 10
  LOG_LEVEL: "info"
  ENV_NAME: "dev"


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Clean before build
        run: mvn clean
      - name: Build with Maven
        run: mvn compile
      - name: Run tests
        run: mvn test -Denv=${{ env.ENV_NAME }}

